name: axelo

# ── Managed Database ──────────────────────────────────────────────────────────
databases:
  - name: axelo-db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  - name: backend
    github:
      repo: MislavNovalic/axelo_fixed
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile

    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1

    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      failure_threshold: 3

    # Backend handles /api routes — DO load balancer routes to this service
    # preserve_path_prefix: true ensures /api/auth/login reaches FastAPI as
    # /api/auth/login (not /auth/login which would be a 404)
    routes:
      - path: /api
        preserve_path_prefix: true

    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${axelo-db.DATABASE_URL}

      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "REPLACE_ME_run_openssl_rand_hex_32"

      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production

      - key: UPLOAD_DIR
        scope: RUN_TIME
        value: /uploads

      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://axelo.dev,https://www.axelo.dev,${APP_URL}

      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://axelo.dev

      - key: SMTP_HOST
        scope: RUN_TIME
        value: ""
      - key: SMTP_PORT
        scope: RUN_TIME
        value: "587"
      - key: SMTP_USERNAME
        scope: RUN_TIME
        value: ""
      - key: SMTP_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: SMTP_FROM
        scope: RUN_TIME
        value: "noreply@axelo.dev"
      - key: SMTP_FROM_NAME
        scope: RUN_TIME
        value: "Axelo"
      - key: SMTP_TLS
        scope: RUN_TIME
        value: "true"

      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: AI_ENABLED
        scope: RUN_TIME
        value: "false"

      - key: EMAIL_VERIFICATION_ENABLED
        scope: RUN_TIME
        value: "false"

      - key: CAPTCHA_ENABLED
        scope: RUN_TIME
        value: "false"

      - key: REDIS_URL
        scope: RUN_TIME
        value: "redis://localhost:6379/0"

  # ── Frontend (Vue 3 + nginx static) ─────────────────────────────────────────
  - name: frontend
    github:
      repo: MislavNovalic/axelo_fixed
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: frontend/Dockerfile

    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1

    health_check:
      http_path: /
      initial_delay_seconds: 10
      period_seconds: 10

    # Frontend handles everything except /api (which goes to backend above)
    routes:
      - path: /
