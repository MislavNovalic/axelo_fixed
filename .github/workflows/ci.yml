name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: axelo
          POSTGRES_PASSWORD: axelo
          POSTGRES_DB: axelo_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run linter (ruff)
        run: pip install ruff && ruff check app/ || true   # warn, don't fail yet

      - name: Run tests
        env:
          DATABASE_URL: postgresql://axelo:axelo@localhost:5432/axelo_test
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: test
        run: |
          python -c "
          from app.database import Base, engine
          import app.models
          Base.metadata.create_all(bind=engine)
          "
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found yet — add tests/test_*.py"

  # ── Frontend: build check ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE=$(du -sk dist/assets/*.js 2>/dev/null | awk '{sum+=$1} END {print sum}')
          echo "JS bundle: ~${BUNDLE}KB"
          # Warn if over 500KB
          if [ "${BUNDLE:-0}" -gt 500 ]; then
            echo "::warning::JS bundle is ${BUNDLE}KB (target < 500KB)"
          fi

  # ── Docker: build images ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
