version: "3.9"

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: axelo
      POSTGRES_PASSWORD: axelo
      POSTGRES_DB: axelo
    volumes:
      - pgdata:/var/lib/postgresql/data
    # A05: Don't expose DB port to host
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axelo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://axelo:axelo@db:5432/axelo
      SECRET_KEY: change-me-in-production
      UPLOAD_DIR: /uploads
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:4173
      # OAuth SSO — set these in your .env file or DigitalOcean App Platform env vars
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      # Set to your public domain in production, e.g. https://axelo.dev
      FRONTEND_URL: "http://localhost:4173"
      # Leave empty on Digital Ocean (Nginx proxies /api on same domain as frontend)
      OAUTH_REDIRECT_BASE: ""
      # Phase 4 — AI
      ANTHROPIC_API_KEY: ""
      AI_ENABLED: "true"
      # Phase 5 — Redis
      REDIS_URL: "redis://redis:6379/0"
      # Email — set RESEND_API_KEY to use Resend (recommended), or fill SMTP_* for other providers
      EMAIL_VERIFICATION_ENABLED: "true"
      RESEND_API_KEY: ""
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "noreply@yourdomain.com"
      SMTP_FROM_NAME: "Axelo"
      SMTP_TLS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # A05: Only expose backend via nginx proxy (comment out for direct API dev access)
    expose:
      - "8000"
    ports:
      - "9876:8000"   # Keep for dev; remove in production
    volumes:
      - uploads:/uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  worker:
    build: ./backend
    command: arq app.core.queue.WorkerSettings
    environment:
      DATABASE_URL: postgresql://axelo:axelo@db:5432/axelo
      SECRET_KEY: change-me-in-production
      UPLOAD_DIR: /uploads
      ENVIRONMENT: development
      FRONTEND_URL: "http://localhost:4173"
      REDIS_URL: "redis://redis:6379/0"
      # Email — same as backend
      RESEND_API_KEY: ""
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "noreply@axelo.dev"
      SMTP_FROM_NAME: "Axelo"
      SMTP_TLS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
